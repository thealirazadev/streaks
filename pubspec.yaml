name: streaks
description: A private, local-first habit and streak tracker.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: 3.44.6

dependencies:
  drift: 2.29.0
  flutter:
    sdk: flutter
  flutter_local_notifications: 22.0.1
  flutter_riverpod: 3.0.3
  flutter_timezone: 5.1.0
  intl: 0.20.3
  path: 1.9.1
  path_provider: 2.1.6
  riverpod_annotation: 3.0.3
  sqlite3_flutter_libs: 0.5.42
  timezone: 0.11.1

dev_dependencies:
  build_runner: 2.10.3
  custom_lint: 0.8.1
  drift_dev: 2.29.0
  flutter_lints: 6.0.0
  flutter_test:
    sdk: flutter
  riverpod_generator: 3.0.3
  riverpod_lint: 3.0.3

flutter:
  uses-material-design: true
